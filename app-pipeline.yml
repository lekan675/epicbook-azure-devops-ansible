trigger:
  branches:
    include:
      - main

pool:
  name: 'epicbook-agent'

variables:
  - group: epicbook-secrets   # must contain: vm_public_ip, mysql_fqdn, db_password, db_admin_user
  - name: ansibleDir
    value: '$(Build.SourcesDirectory)/ansible'

steps:

  # ── Checkout repo ──────────────────────────────────────────────────────────
  - checkout: self
    displayName: 'Checkout App Repository'

  # ── Download SSH private key ───────────────────────────────────────────────
  - task: DownloadSecureFile@1
    name: sshPrivateKey
    displayName: 'Download SSH Private Key'
    inputs:
      secureFile: 'id_rsa'

  # ── Install SSH key ────────────────────────────────────────────────────────
  - script: |
      mkdir -p ~/.ssh
      cp "$(sshPrivateKey.secureFilePath)" ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      echo "SSH key installed."
    displayName: 'Install SSH Private Key'

  # ── Install Ansible ────────────────────────────────────────────────────────
  - script: |
      set -e
      sudo apt-get update -y
      sudo apt-get install -y ansible python3-pip
      pip3 install --break-system-packages PyMySQL
      ansible-galaxy collection install community.general community.mysql
      ansible --version
    displayName: 'Install Ansible and Collections'

  # ── Inject VM public IP into inventory.ini ─────────────────────────────────
  # Only the IP goes into inventory — all other secrets are passed via --extra-vars
  - script: |
      set -e
      cd $(ansibleDir)
      sed -i "s|<VM_PUBLIC_IP>|$(vm_public_ip)|g" inventory.ini
      echo "inventory.ini:"
      cat inventory.ini
    displayName: 'Inject VM Public IP into inventory.ini'

  # ── Test SSH connectivity ──────────────────────────────────────────────────
  - script: |
      set -e
      cd $(ansibleDir)
      ansible web -i inventory.ini -m ping
    displayName: 'Test SSH Connectivity to VM'

  # ── Run Ansible Playbook ───────────────────────────────────────────────────
  # All secrets are passed via --extra-vars at runtime
  # group_vars/web.yml no longer needs to contain real values
  - script: |
      set -e
      cd $(ansibleDir)

      ansible-playbook \
        -i inventory.ini \
        site.yml \
        --private-key ~/.ssh/id_rsa \
        --extra-vars "db_host=$(mysql_fqdn)" \
        --extra-vars "db_password=$(db_password)" \
        --extra-vars "db_user=$(db_admin_user)" \
        -v
    displayName: 'Run Ansible Playbook (common → nginx → epicbook)'
    env:
      # Expose secret variable group values to the script environment
      db_password: $(db_password)
      db_admin_user: $(db_admin_user)
      mysql_fqdn: $(mysql_fqdn)
      vm_public_ip: $(vm_public_ip)

  # ── Verify app is live ─────────────────────────────────────────────────────
  - script: |
      set -e
      echo "Waiting 20 seconds for app to start..."
      sleep 20

      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$(vm_public_ip))
      echo "HTTP status: $HTTP_STATUS"

      if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
        echo "EpicBook is live at http://$(vm_public_ip)"
      else
        echo "Unexpected HTTP status: $HTTP_STATUS"
        exit 1
      fi
    displayName: 'Verify EpicBook HTTP Response'

  # ── Summary ───────────────────────────────────────────────────────────────
  - script: |
      echo "================================================="
      echo "  EpicBook deployment complete"
      echo "  URL : http://$(vm_public_ip)"
      echo "  DB  : $(mysql_fqdn):3306"
      echo "================================================="
    displayName: 'Deployment Summary'

